openapi: 3.0.3
info:
  title: TDC Floripa 2026 Tool API
  version: 1.0.0
  description: Consulta programacao, trilhas e speakers do TDC Floripa 2026.
servers:
  - url: https://SEU_ENDPOINT_PUBLICO
paths:
  /event:
    get:
      operationId: getEventInfo
      summary: Retorna informacoes gerais do TDC Floripa 2026
      responses:
        "200":
          description: Informacoes gerais do evento
  /tracks:
    get:
      operationId: listTracks
      summary: Lista trilhas, opcionalmente filtradas por dia
      parameters:
        - name: day
          in: query
          required: false
          schema:
            type: string
          description: Dia no formato 22/jul, 23/jul ou 24/jul
      responses:
        "200":
          description: Lista de trilhas
  /sessions:
    get:
      operationId: searchSessions
      summary: Busca sessoes por dia, trilha ou termo
      parameters:
        - name: day
          in: query
          required: false
          schema:
            type: string
        - name: track
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Sessoes encontradas
  /speakers:
    get:
      operationId: searchSpeakers
      summary: Busca speakers e suas sessoes
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Speakers encontrados
